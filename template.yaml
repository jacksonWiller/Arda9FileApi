AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sample SAM Template for Arda9FileApiV1

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 100

Resources:
  NetCodeWebAPIServerless:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      Description: A simple example includes a .NET Core WebAPI App with DynamoDB table.
      CodeUri: ./src/Arda9File.Api/
      Handler: Arda9File.Api
      Runtime: dotnet8
      MemorySize: 1024
      Environment: # More info about Env Vars: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#environment-object
        Variables:
          SAMPLE_TABLE: !Ref SampleTable
      Policies:
        # Give Create/Read/Update/Delete Permissions to the SampleTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SampleTable
        # Permissões S3 para listar todos os buckets
        - Statement:
            - Sid: S3ListAllBuckets
              Effect: Allow
              Action:
                - s3:ListAllMyBuckets
                - s3:GetBucketLocation
              Resource: '*'
        # Permissões S3 para operações em buckets específicos
        - Statement:
            - Sid: S3BucketOperations
              Effect: Allow
              Action:
                - s3:CreateBucket
                - s3:DeleteBucket
                - s3:ListBucket
                - s3:GetBucketVersioning
                - s3:PutBucketVersioning
                - s3:GetBucketPolicy
                - s3:PutBucketPolicy
                - s3:DeleteBucketPolicy
                - s3:GetBucketAcl
                - s3:PutBucketAcl
                - s3:GetBucketCORS
                - s3:PutBucketCORS
                - s3:DeleteBucketCORS
                - s3:PutBucketPublicAccessBlock
                - s3:GetBucketPublicAccessBlock
              Resource: 
                - 'arn:aws:s3:::*'
        # Permissões S3 para operações em objetos
        - Statement:
            - Sid: S3ObjectOperations
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:GetObjectAcl
                - s3:PutObjectAcl
                - s3:GetObjectVersion
                - s3:DeleteObjectVersion
                - s3:ListMultipartUploadParts
                - s3:AbortMultipartUpload
              Resource: 
                - 'arn:aws:s3:::*/*'
      Events:
        ProxyResource:
          Type: HttpApi
          Properties:
            PayloadFormatVersion: "2.0"
            Path: /{proxy+}
            Method: ANY
        RootResource:
          PayloadFormatVersion: "2.0"
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

  # DynamoDB Single Table Design with PK/SK
  SampleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: arda9-file-v3
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1: Para queries por Bucket (listar arquivos/folders por bucket)
        - IndexName: GSI1-Index
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI2: Para queries por Folder (listar arquivos por folder)
        - IndexName: GSI2-Index
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI3: Para queries por Company (listar buckets/folders/arquivos por empresa)
        - IndexName: GSI3-Index
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
          Projection:
            ProjectionType: ALL

Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
